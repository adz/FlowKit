baseURL = "https://adz.github.io/FsFlow/"
canonifyURLs = true
locale = "en-us"
title = "FsFlow"
theme = ["github.com/google/docsy"]

# Language configuration
defaultContentLanguage = "en"

[outputs]
  home = ["html", "rss", "json"]

[module]
  [[module.imports]]
    path = "github.com/google/docsy"
    disable = false
  [[module.imports]]
    path = "github.com/google/docsy/dependencies"
    disable = false

  # Basic mounts
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "content"
    target = "content"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNoStart = 1
    lineNos = false
    style = "tango"

[params]
  offlineSearch = true
  copyright = "Adam Davies"
  github_repo = "https://github.com/adz/FsFlow"
  version = "next"
  version_menu = "next"
  version_menu_pagelinks = true
  [[params.versions]]
    version = "next"
    name = "next"
    url = "/FsFlow/"
  
  # Navigation links
  [[params.links.user]]
    name = "GitHub"
    url = "https://github.com/adz/FsFlow"
    icon = "fab fa-github"
    desc = "Source Code"

[params.ui]
  sidebar_menu_foldable = true
  sidebar_menu_compact = false
  sidebar_menu_truncate = 600
  breadcrumb_disable = false
  footer_about_enable = false

[outputFormats]
  [outputFormats.Print]
    baseName = "index"
    isHTML = true
    mediaType = "text/html"
    path = "print"
    rel = "alternate"

[menu]
  [[menu.main]]
    name = "Docs"
    pageRef = "/docs"
    weight = 10
  [[menu.main]]
    name = "Reference"
    pageRef = "/reference"
    weight = 20
  [[menu.main]]
    name = "GitHub"
    url = "https://github.com/adz/FsFlow"
    weight = 30
