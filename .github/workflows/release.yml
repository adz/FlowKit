name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore local tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore

      - name: Run test harness
        run: dotnet run --project tests/FsFlow.Tests/FsFlow.Tests.fsproj --nologo

      - name: Pack library
        run: dotnet pack src/FsFlow/FsFlow.fsproj --configuration Release --output artifacts/package

      - name: Build API docs
        run: bash scripts/generate-api-docs.sh

      - name: Archive package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: artifacts/package/
          if-no-files-found: error

      - name: Archive generated docs
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: output/
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/package/*.nupkg
            artifacts/package/*.snupkg
